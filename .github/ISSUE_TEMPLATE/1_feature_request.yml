name: "🚀 Feature Request"
description: Suggest an idea for this project
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### Have a great idea? 💡
        Thanks for suggesting a new feature! Please describe your proposal below.
  - type: textarea
    id: problem
    attributes:
      label: "❓ Is your feature request related to a problem?"
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "✨ Describe the solution you'd like"
      description: A clear and concise description of what you want to happen.
      placeholder: It would be great if the app could [...]
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "🛣️ Describe alternatives you've considered"
      description: Any alternative solutions or features you've considered.
  - type: textarea
    id: context
    attributes:
      label: "💡 Additional context"
      description: Add any other context or screenshots about the feature request here.
  - type: checkboxes
    id: participation
    attributes:
      label: "🤝 Participation"
      options:
        - label: I am willing to help implement this feature.
