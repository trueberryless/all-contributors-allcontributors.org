name: "🐛 Bug Report"
description: Report an issue to help us improve 🚀
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report! 🚀
  - type: textarea
    id: description
    attributes:
      label: "📝 Describe the bug"
      description: A clear and concise description of what the bug is.
      placeholder: When I click the submit button, the page freezes.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "👣 Steps to Reproduce"
      description: How can we see the error ourselves?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "🎯 Expected behavior"
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "💡 Additional context"
      description: Add any other context or drag-and-drop screenshots here.
  - type: checkboxes
    id: participation
    attributes:
      label: "🤝 Participation"
      options:
        - label: I am willing to submit a pull request for this issue.
